name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
      - run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile
      - run: nix develop --accept-flake-config --command pnpm lint
      - run: nix develop --accept-flake-config --command pnpm typecheck
      - run: nix develop --accept-flake-config --command pnpm test

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
      - run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile
      - run: nix develop --accept-flake-config --command pnpm build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
