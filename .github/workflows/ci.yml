name: ci
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
      - run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile
      - run: nix develop --accept-flake-config --command pnpm lint
      - run: nix develop --accept-flake-config --command pnpm typecheck
      - run: nix develop --accept-flake-config --command pnpm test

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
      - run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile
      - name: 公開ディレクトリ名を決定
        id: preview_path
        run: echo "value=$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: プレビューをビルド
        env:
          VITE_BASE_PATH: /markwhen-viewer/previews/pr-${{ github.event.pull_request.number }}/${{ steps.preview_path.outputs.value }}/
        run: nix develop --accept-flake-config --command pnpm build
      - name: プレビュー配置
        run: |
          target_dir="previews/pr-${{ github.event.pull_request.number }}/${{ steps.preview_path.outputs.value }}"
          mkdir -p "publish/${target_dir}"
          cp -r dist/. "publish/${target_dir}/"
      - name: GitHub Pagesへデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: publish
          keep_files: true
      - name: PRへURLを通知
        uses: actions/github-script@v7
        with:
          env:
            PREVIEW_PATH: ${{ steps.preview_path.outputs.value }}
          script: |
            const path = process.env.PREVIEW_PATH;
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/previews/pr-${context.payload.pull_request.number}/${path}/`;
            const body = [
              '🔎 プレビューを更新しました。',
              `- URL: ${url}`,
              `- Commit: ${context.sha}`
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
      - name: マージ済みPRのプレビューを削除
        run: rm -rf "gh-pages/previews/pr-${{ github.event.pull_request.number }}"
      - name: GitHub Pagesへ反映
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages

  deploy-main:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
      - run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile
      - name: 本番ページをビルド
        env:
          VITE_BASE_PATH: /markwhen-viewer/
        run: nix develop --accept-flake-config --command pnpm build
      - run: mkdir -p publish && cp -r dist/. publish/
      - name: スナップショット用ディレクトリ名を決定
        id: merged_path
        run: echo "value=$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: マージ時点のスナップショットをビルド
        env:
          VITE_BASE_PATH: /markwhen-viewer/merged/${{ steps.merged_path.outputs.value }}/
        run: nix develop --accept-flake-config --command pnpm build
      - run: |
          mkdir -p "publish/merged/${{ steps.merged_path.outputs.value }}"
          cp -r dist/. "publish/merged/${{ steps.merged_path.outputs.value }}/"
      - name: GitHub Pagesへデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: publish
          keep_files: true
