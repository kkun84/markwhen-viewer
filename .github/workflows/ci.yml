name: ci
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    if: github.event.action != 'closed'
  deploy_main:
      contents: write
      - name: メタデータを出力
        run: |
          mkdir -p dist
          cat > dist/preview-meta.json <<EOF
          {
            "type": "main",
            "branch": "${GITHUB_REF_NAME}",
            "commit": "${GITHUB_SHA}",
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      - name: main の latest を更新
        uses: peaceiris/actions-gh-pages@v4
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: latest
          keep_files: true
      - name: main のコミット別アーカイブを保存
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: releases/${{ github.sha }}
          keep_files: true
      - name: main のアーカイブを直近50件に制限
        run: |
          git fetch origin gh-pages
          git checkout -B gh-pages-cleanup origin/gh-pages
          if [ -d releases ]; then
            ls -1t releases | tail -n +51 | while read -r old; do
              rm -rf "releases/${old}"
            done
          fi
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m "chore: mainアーカイブの古い履歴を削除"
            git push origin gh-pages-cleanup:gh-pages
          fi

  deploy_preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
      - run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile
      - run: nix develop --accept-flake-config --command pnpm build
      - name: メタデータを出力
        run: |
          mkdir -p dist
          cat > dist/preview-meta.json <<EOF
          {
            "type": "pull_request",
            "pr": "${{ github.event.pull_request.number }}",
            "commit": "${GITHUB_SHA}",
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      - name: PR の latest を更新
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: previews/pr-${{ github.event.pull_request.number }}/latest
          keep_files: true
      - name: PR のコミット別アーカイブを保存
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: previews/pr-${{ github.event.pull_request.number }}/${{ github.sha }}
          keep_files: true
      - name: PR のアーカイブを直近20件に制限
        run: |
          git fetch origin gh-pages
          git checkout -B gh-pages-cleanup origin/gh-pages
          dir="previews/pr-${{ github.event.pull_request.number }}"
          if [ -d "$dir" ]; then
            ls -1t "$dir" | grep -v '^latest$' | tail -n +21 | while read -r old; do
              rm -rf "$dir/${old}"
            done
          fi
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m "chore: PRプレビューの古い履歴を削除"
            git push origin gh-pages-cleanup:gh-pages
          fi
      - name: PRコメントにプレビューURLを投稿
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number
            const sha = context.sha
            const owner = context.repo.owner
            const repo = context.repo.repo
            const baseUrl = `https://${owner}.github.io/${repo}`
            const latestUrl = `${baseUrl}/previews/pr-${pr}/latest/`
            const commitUrl = `${baseUrl}/previews/pr-${pr}/${sha}/`
            const body = [
              'プレビューを更新しました。',
              '',
              `- latest: ${latestUrl}`,
              `- commit: ${commitUrl}`,
              `- SHA: ${sha}`,
            ].join('\n')
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr,
              body,
            })

  cleanup_preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: PRクローズ時にプレビューを削除
        run: |
          git fetch origin gh-pages
          git checkout -B gh-pages-cleanup origin/gh-pages
          rm -rf "previews/pr-${{ github.event.pull_request.number }}"
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m "chore: クローズしたPRのプレビューを削除"
            git push origin gh-pages-cleanup:gh-pages
          fi
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
      - run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile
      - run: nix develop --accept-flake-config --command pnpm lint
      - run: nix develop --accept-flake-config --command pnpm typecheck
      - run: nix develop --accept-flake-config --command pnpm test

  deploy_main:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
      - run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile
      - run: nix develop --accept-flake-config --command pnpm build
      - name: メタデータを出力
        run: |
          mkdir -p dist
          cat > dist/preview-meta.json <<EOF
          {
            "type": "main",
            "branch": "${GITHUB_REF_NAME}",
            "commit": "${GITHUB_SHA}",
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      - name: main の latest を更新
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: latest
          keep_files: true
      - name: main のコミット別アーカイブを保存
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: releases/${{ github.sha }}
          keep_files: true
      - name: main のアーカイブを直近50件に制限
        run: |
          git fetch origin gh-pages
          git checkout -B gh-pages-cleanup origin/gh-pages
          if [ -d releases ]; then
            ls -1t releases | tail -n +51 | while read -r old; do
              rm -rf "releases/${old}"
            done
          fi
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m "chore: mainアーカイブの古い履歴を削除"
            git push origin gh-pages-cleanup:gh-pages
          fi

  deploy_preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
      - run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile
      - run: nix develop --accept-flake-config --command pnpm build
      - name: メタデータを出力
        run: |
          mkdir -p dist
          cat > dist/preview-meta.json <<EOF
          {
            "type": "pull_request",
            "pr": "${{ github.event.pull_request.number }}",
            "commit": "${GITHUB_SHA}",
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      - name: PR の latest を更新
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: previews/pr-${{ github.event.pull_request.number }}/latest
          keep_files: true
      - name: PR のコミット別アーカイブを保存
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: previews/pr-${{ github.event.pull_request.number }}/${{ github.sha }}
          keep_files: true
      - name: PR のアーカイブを直近20件に制限
        run: |
          git fetch origin gh-pages
          git checkout -B gh-pages-cleanup origin/gh-pages
          dir="previews/pr-${{ github.event.pull_request.number }}"
          if [ -d "$dir" ]; then
            ls -1t "$dir" | grep -v '^latest$' | tail -n +21 | while read -r old; do
              rm -rf "$dir/${old}"
            done
          fi
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m "chore: PRプレビューの古い履歴を削除"
            git push origin gh-pages-cleanup:gh-pages
          fi
      - name: PRコメントにプレビューURLを投稿
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number
            const sha = context.sha
            const owner = context.repo.owner
            const repo = context.repo.repo
            const baseUrl = `https://${owner}.github.io/${repo}`
            const latestUrl = `${baseUrl}/previews/pr-${pr}/latest/`
            const commitUrl = `${baseUrl}/previews/pr-${pr}/${sha}/`
            const body = [
              'プレビューを更新しました。',
              '',
              `- latest: ${latestUrl}`,
              `- commit: ${commitUrl}`,
              `- SHA: ${sha}`,
            ].join('\n')
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr,
              body,
            })

  cleanup_preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: PRクローズ時にプレビューを削除
        run: |
          git fetch origin gh-pages
          git checkout -B gh-pages-cleanup origin/gh-pages
          rm -rf "previews/pr-${{ github.event.pull_request.number }}"
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m "chore: クローズしたPRのプレビューを削除"
            git push origin gh-pages-cleanup:gh-pages
          fi
