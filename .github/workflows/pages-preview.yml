name: PRプレビュー公開

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: pages-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.jsを設定
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: pnpmを設定
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: プレビュー用パスを計算
        run: |
          PREVIEW_PATH="previews/pr-${{ github.event.pull_request.number }}/${{ github.sha }}"
          BASE_PATH="/${{ github.event.repository.name }}/${PREVIEW_PATH}/"
          echo "PREVIEW_PATH=${PREVIEW_PATH}" >> "$GITHUB_ENV"
          echo "BASE_PATH=${BASE_PATH}" >> "$GITHUB_ENV"
          echo "プレビューURL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${PREVIEW_PATH}/"

      - name: ビルド
        run: pnpm build -- --base "$BASE_PATH"

      - name: gh-pagesへ配置
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: ${{ env.PREVIEW_PATH }}
          keep_files: true

      - name: PRにURLを通知
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '✅ PRプレビューを更新しました。',
              '',
              `- Commit: ${context.sha}`,
              `- URL: https://${context.repo.owner}.github.io/${context.repo.repo}/${process.env.PREVIEW_PATH}/`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
