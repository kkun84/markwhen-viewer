name: 本番スナップショット公開

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages-main
  cancel-in-progress: false

jobs:
  deploy-main:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.jsを設定
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: pnpmを設定
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: 公開パスを計算
        run: |
          SNAPSHOT_PATH="snapshots/${{ github.sha }}"
          LATEST_PATH="main/latest"
          BASE_PATH="/${{ github.event.repository.name }}/${SNAPSHOT_PATH}/"
          echo "SNAPSHOT_PATH=${SNAPSHOT_PATH}" >> "$GITHUB_ENV"
          echo "LATEST_PATH=${LATEST_PATH}" >> "$GITHUB_ENV"
          echo "BASE_PATH=${BASE_PATH}" >> "$GITHUB_ENV"

      - name: スナップショット用にビルド
        run: pnpm build -- --base "$BASE_PATH"

      - name: マージ後スナップショットを保存
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: ${{ env.SNAPSHOT_PATH }}
          keep_files: true

      - name: latest用にビルド
        run: pnpm build -- --base "/${{ github.event.repository.name }}/${{ env.LATEST_PATH }}/"

      - name: latestを更新
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: ${{ env.LATEST_PATH }}
          keep_files: true
