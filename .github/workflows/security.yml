name: security
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
      - run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile
      - run: nix develop --accept-flake-config --command pnpm audit --prod
